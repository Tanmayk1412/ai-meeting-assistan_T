<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - AI Meeting Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px 20px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .status {
      padding: 12px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #555;
    }
    
    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }
    
    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    
    .btn-secondary {
      background: #e9ecef;
      color: #333;
    }
    
    .btn-secondary:active {
      transform: scale(0.98);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features won't work, but you can still view cached content.</p>
    
    <div class="status" id="status">
      Checking connection...
    </div>
    
    <div class="actions">
      <button class="btn-primary" onclick="window.location.href='/'">
        📱 Go to Home
      </button>
      <button class="btn-secondary" onclick="window.location.reload()">
        🔄 Try Again
      </button>
    </div>
  </div>

  <script>
    // Check connection status
    function updateStatus() {
      const status = navigator.onLine ? '✅ Connected!' : '❌ No Connection';
      const color = navigator.onLine ? '#10b981' : '#ef4444';
      document.getElementById('status').innerHTML = `<span style="color: ${color}">${status}</span>`;
    }

    updateStatus();
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Auto-refresh when back online
    window.addEventListener('online', () => {
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    });
  </script>
</body>
</html>
